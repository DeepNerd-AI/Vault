name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check_style:
    name: Code Style & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Cargo formatting
        run: cargo fmt --all -- --check

  build_and_test:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    needs: check_style
    env:
      CC: clang
      CXX: clang++
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Cargo config for CI
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/ci-config.toml ./../.cargo/config.toml

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux system dependencies
        run: ./script/linux

      - name: Download WASI SDK
        run: ./script/download-wasi-sdk

      - name: Run Cargo clippy
        run: ./script/clippy

      - name: Run Cargo tests
        run: cargo test --workspace --no-fail-fast --no-tests=warn

      - name: Clean up Cargo config
        if: always()
        run: rm -rf ./../.cargo

  release:
    name: Create GitHub Release & Upload Packages
    runs-on: ubuntu-latest
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      CC: clang
      CXX: clang++
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Cargo config for CI
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/ci-config.toml ./../.cargo/config.toml

      - name: Set up Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux system dependencies
        run: ./script/linux

      - name: Download WASI SDK
        run: ./script/download-wasi-sdk

      - name: Build release packages
        run: |
          # Build Linux package and Debian package
          ./script/bundle-linux
          ./script/bundle-deb

      - name: Verify build artifacts
        run: |
          echo "Verifying artifacts..."
          ls -la target/release/
          
          # Detect actual built artifacts in target/release/
          TARBALL=$(ls target/release/vault-linux-*.tar.gz | head -n 1)
          DEB=$(ls target/release/vault-*.deb | head -n 1)
          
          if [ -f "$TARBALL" ]; then
            echo "Tarball artifact verified: $TARBALL"
          else
            echo "Error: Release tarball not found!"
            exit 1
          fi
          
          if [ -f "$DEB" ]; then
            echo "Debian artifact verified: $DEB"
          else
            echo "Error: Debian package not found!"
            exit 1
          fi

      - name: Upload build artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: vault-linux-release-packages
          path: |
            target/release/vault-linux-*.tar.gz
            target/release/vault-*.deb
            target/vault-remote-server-linux-*.gz
          if-no-files-found: error

      - name: Create GitHub Release and Upload Assets
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $TAG_NAME"
          
          # Detect files for upload
          TARBALL=$(ls target/release/vault-linux-*.tar.gz | head -n 1)
          DEB=$(ls target/release/vault-*.deb | head -n 1)
          REMOTE_SERVER=$(ls target/vault-remote-server-linux-*.gz | head -n 1)
          
          # Check if tag is prerelease (contains beta, alpha, pre, rc, etc.)
          PRERELEASE_FLAG=""
          if [[ "$TAG_NAME" =~ (beta|alpha|pre|rc) ]]; then
            PRERELEASE_FLAG="--prerelease"
            echo "Prerelease tag detected. Tag: $TAG_NAME"
          fi
          
          gh release create "$TAG_NAME" \
            "$TARBALL" \
            "$DEB" \
            "$REMOTE_SERVER" \
            --title "Vault Release $TAG_NAME" \
            --generate-notes \
            $PRERELEASE_FLAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up Cargo config
        if: always()
        run: rm -rf ./../.cargo
